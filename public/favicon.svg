<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- background -->
  <rect width="64" height="64" fill="#080808"/>
  <!-- gold border -->
  <rect x="2" y="2" width="60" height="60" fill="none" stroke="#C9A84C" stroke-width="1.5"/>
  <!-- graduation cap -->
  <polygon points="32,9 22,15 32,21 42,15" fill="#C9A84C"/>
  <line x1="42" y1="15" x2="42" y2="24" stroke="#C9A84C" stroke-width="2.5" stroke-linecap="round"/>
  <!-- C in purple -->
  <text x="8" y="52" font-family="Georgia, serif" font-size="34" font-weight="bold" fill="#6B3FA0">C</text>
  <!-- A in gold -->
  <text x="32" y="52" font-family="Georgia, serif" font-size="34" font-weight="bold" fill="#C9A84C">A</text>
</svg>
